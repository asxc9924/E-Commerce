<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AURA | Checkout Cancelled</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Lato:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Lato', sans-serif; background-color: #F9F8F4; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center; }
        .card { background: white; padding: 4rem; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); max-width: 500px; }
        h1 { font-family: 'Playfair Display', serif; font-size: 2.5rem; margin-bottom: 1rem; color: #1A1A1A; }
        p { color: #5A5A5A; margin-bottom: 2rem; }
        .btn { display: inline-block; padding: 1rem 2.5rem; background: transparent; border: 1px solid #7D6334; color: #7D6334; text-decoration: none; border-radius: 5px; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        .btn:hover { background: #7D6334; color: white; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Payment Cancelled</h1>
        <p>Your order was not processed. If you had trouble with the payment method or have questions about our technology, our team is here to help.</p>
        <a href="/" class="btn">Back to Shop</a>
    </div>
</body>
</html>
