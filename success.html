<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AURA | Order Confirmed</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Lato:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Lato', sans-serif; background-color: #F9F8F4; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center; }
        .card { background: white; padding: 4rem; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); max-width: 500px; }
        .icon { font-size: 4rem; color: #7D6334; margin-bottom: 1.5rem; }
        h1 { font-family: 'Playfair Display', serif; font-size: 2.5rem; margin-bottom: 1rem; }
        p { color: #5A5A5A; margin-bottom: 2rem; line-height: 1.6; }
        .btn { display: inline-block; padding: 1rem 2.5rem; background: #7D6334; color: white; text-decoration: none; border-radius: 5px; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        .btn:hover { background: #5A4623; }
    </style>
</head>
<body>
    <div class="card">
        <i class="fa-solid fa-circle-check icon"></i>
        <h1>Order Confirmed</h1>
        <p>Thank you for bringing AURA into your space. We are currently hand-preparing your bio-acoustic sculpture. A confirmation email is on its way.</p>
        <a href="/" class="btn">Return to Gallery</a>
    </div>
</body>
</html>
